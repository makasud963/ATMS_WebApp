spring.application.name=ATMS_WebApp

# ===============================
# SERVER CONFIG
# ===============================
server.port=9097
server.address=0.0.0.0
# ===============================
# MYSQL DATABASE CONFIG
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/Atms_webapp_db
spring.datasource.username=root
spring.datasource.password=root@2025

# ===============================
# JPA/HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# LOGGING CONFIG
# ===============================
logging.file.name=AppLOG/atms-webapp.log
logging.level.root=INFO

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=ATMSSecretKeyForJwtAuthentication123456789
jwt.expiration=86400000

spring.messages.encoding=UTF-8L



