spring.application.name=ATMS_WebApp
server.port=8080
server.address=0.0.0.0

# PostgreSQL Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/atmsdb?currentSchema=atmsdev01
spring.datasource.username=udev01
spring.datasource.password=udev01

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional PostgreSQL Optimizations
spring.jpa.properties.hibernate.default_schema=atmsdev01
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Logging
logging.file.name=AppLOG/atms-webapp.log
logging.level.root=INFO

# JWT
jwt.secret=ATMSSecretKeyForJwtAuthentication123456789
#jwt.expiration=86400000
jwt.expiration.minutes=2

# Internationalization
spring.messages.encoding=UTF-8

file.upload-dir=D:/uploads/profile-images
# CORS Configuration - Allowed Frontend URLs
app.cors.allowed-origins=http://localhost:5177,http://localhost:5173,http://192.168.1.101:5173
